{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ post.title }} · Hendrik's Blog</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#faf9f6;color:#2c2c2a;font-family:'Lato',sans-serif;font-weight:400;line-height:1.7}
        nav{background:#fff;border-bottom:0.5px solid #e8e5df;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
        .logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:#2c2c2a}
        .logo span{color:#d85a30}
        .nav-links{display:flex;gap:2rem}
        .nav-links a{color:#888780;font-size:.85rem;text-decoration:none;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
        .nav-links a:hover{color:#2c2c2a}
        .back{font-size:.78rem;color:#d85a30;font-weight:700;letter-spacing:.04em;text-decoration:none;text-transform:uppercase;display:inline-block;margin-bottom:2rem}
        .back:hover{color:#993c1d}
        .main{max-width:680px;margin:3rem auto;padding:0 1.5rem}
        .post-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
        .post-date{color:#b4b2a9;font-size:.78rem}
        h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:600;line-height:1.2;color:#2c2c2a;margin-bottom:1.5rem}
        .author{display:flex;align-items:center;gap:.5rem;margin-bottom:2rem;padding-bottom:2rem;border-bottom:0.5px solid #e8e5df}
        .avatar{width:32px;height:32px;border-radius:50%;background:#faece7;color:#993c1d;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
        .author-name{font-size:.85rem;color:#888780}
        .post-body{font-size:1rem;line-height:1.85;color:#444441;font-weight:300}
        .post-body p{margin-bottom:1.2rem}
        footer{border-top:0.5px solid #e8e5df;padding:2rem;text-align:center;color:#b4b2a9;font-size:.78rem;margin-top:4rem;background:#fff}
    </style>
</head>
<body>
<nav>
    <div class="logo">Hendrik<span>.</span></div>
    <div class="nav-links">
        <a href="/">Blog</a>
        <a href="/admin">Admin</a>
    </div>
</nav>
<div class="main">
    <a class="back" href="/">← Back</a>
    <div class="post-meta">
        <span class="post-date">{{ post.published_date|date:"d M Y" }}</span>
    </div>
    <h1>{{ post.title }}</h1>
    <div class="author">
        <div class="avatar">{{ post.author.username|slice:":2"|upper }}</div>
        <span class="author-name">{{ post.author.username }}</span>
    </div>
    <div class="post-body">
        {{ post.text|linebreaksbr }}
    </div>
</div>
<footer>© 2026 Hendrik · Made with Django</footer>
</body>
</html>
